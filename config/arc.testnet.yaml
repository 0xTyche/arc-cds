  multicall3: "0xcA11bde05977b3631167028862bE2a173976CA11"
  permit2: "0x000000000022D473030F116dDEE9F6B43aC78BA3"

# -----------------------------------------------------------------------------
# Oracles
# Provider docs:
#   Chainlink: https://docs.chain.link/data-feeds/price-feeds/addresses
#   Pyth:      https://docs.pyth.network/price-feeds/core/contract-addresses/evm
#   RedStone:  https://app.redstone.finance/push-feeds
#   Stork:     https://docs.stork.network/resources/contract-addresses/evm#arc
#
# Specific feed addresses for Arc Testnet must be filled in after each
# provider publishes Arc-specific deployments. Until then, code paths
# consuming these MUST guard against TBD with fail-fast errors.
# -----------------------------------------------------------------------------
oracles:
  chainlink:
    enabled: false                       # flip to true once feed addresses pinned
    dataFeeds: {}                        # e.g. usdcUsd: "0x..."
    vrfCoordinator: TBD                  # required by pitfall #3 (randomness)
  pyth:
    enabled: false
    contract: TBD
    priceIds: {}                         # symbol -> Pyth price feed id
    entropyContract: TBD                 # alternative VRF provider
  redstone:
    enabled: false
    pushFeeds: {}
    pullModelEnabled: false
    notes: |
      RedStone has dedicated RWA / tokenized-fund feeds — primary candidate
      for USYC mark price.
  stork:
    enabled: false
    contract: TBD

# -----------------------------------------------------------------------------
# Arc-CDS protocol parameters (defaults; subject to governance)
# These mirror the values in the original design doc and CLAUDE.md §14
# (still pending final user confirmation).
# -----------------------------------------------------------------------------
protocol:
  governance:
    proposalToken:
      name: CDSProp
      symbol: CDSP
      initialSupply: 1000000000          # 1B
      distribution:
        liquidityMiningAndAirdropPct: 60
        teamVestingPct: 20               # 4-year linear
        daoTreasuryPct: 15
        initialLiquidityPct: 5
    proposalStakeMin: 10000              # CDSProp required to open an inclusion proposal
    proposalFeeUsdc: 100                 # placeholder; confirm in governance review
    votingPeriodSec: 604800              # 7 days
    quorumBps: 1000                      # 10% of staked proposal weight
    timelockSec: 172800                  # 48 h on parameter changes
    slashWinnerSharePct: 100             # losers' stake distributed pro-rata to winners
    loserStakeBurnPct: 100               # of remaining (if any)

  fees:
    protocolFeeBps: 30                   # 0.30% management fee (within 0.1–0.5% band)
    feeBuybackBps: 50                    # 50% of protocol fee buys back & burns CDSProp
    flashLoanFeeBps: 5                   # 0.05% (within 0.01–0.09% band)

  margin:
    initialMarginBps: 1000               # 10% — placeholder, confirm with risk model
    maintenanceMarginBps: 500            # 5%
    liquidationBonusBps: 200             # 2%
    healthFactorLiquidation: 1000        # 1.000 (4-decimal fixed-point)

  oracleSafety:
    maxStalenessSec: 60                  # per-feed staleness ceiling
    twapMinSeconds: 600                  # min TWAP window
    twapMinBlocks: 50                    # pitfall #2 — also gate on block count
    priceDeviationBps: 200               # 2% — diverging sources trigger circuit breaker

  pumpLauncher:
    bondingCurve: linear-vrgda           # placeholder; finalize during design review
    graduationTvlUsdc: 1000000           # 1M USDC TVL graduates to full CDS contract
    creatorFeeBps: 100                   # 1% of bonded volume to issuer