# =============================================================================
# Arc-CDS Protocol — Arc Testnet Configuration
# =============================================================================
# Non-sensitive, on-chain facts and protocol parameters.
# Secrets (private keys, API keys) belong in `.env`, never here.
#
# Last verified against docs.arc.io: 2026-05-17
# Companion document: docs/reference/arc-chain.md
#
# Convention:
#   - All addresses are checksummed Arc Testnet addresses.
#   - "TBD" means a value pending external action (e.g. USYC allowlist,
#     project deployment). Code paths consuming a TBD MUST fail fast with a
#     descriptive error rather than silently using a zero address.
#   - ERC-20 amounts in this file are in human units; conversion to base
#     units (multiplying by 10**decimals) happens in code.
# =============================================================================

network:
  name: arc-testnet
  phase: testnet                         # testnet | mainnet
  chainId: 5042002
  evmVersion: prague
  consensus: malachite-bft
  executionClient: reth
  blockTimeMs: 480                       # ~0.48 s, see pitfall #2
  finality: deterministic-sub-second
  explorerUrl: https://testnet.arcscan.app
  gasTrackerUrl: https://testnet.arcscan.app/gas-tracker
  faucetUrl: https://faucet.circle.com
  statusUrl: https://status.arc.io

rpc:
  primary:
    http: https://rpc.testnet.arc.network
    ws: wss://rpc.testnet.arc.network
  providers:
    blockdaemon:
      http: https://rpc.blockdaemon.testnet.arc.network
      ws: null
    drpc:
      http: https://rpc.drpc.testnet.arc.network
      ws: wss://rpc.drpc.testnet.arc.network
    quicknode:
      http: https://rpc.quicknode.testnet.arc.network
      ws: wss://rpc.quicknode.testnet.arc.network
    alchemy:
      http: TBD                          # add Alchemy URL once API key obtained
      ws: TBD

gas:
  # See docs/reference/arc-chain.md §4 and pitfall #8
  unit: usdc
  unitDecimals: 18                       # native accounting precision
  pricingModel: eip-1559-ewma
  minMaxFeePerGasGwei: 20                # hard floor — below this, tx hangs
  recommendedPriorityFeeGwei: 1
  baseFeeTargetUsd: 0.01
  maxBaseFeeUsdPerGasUnit: 0.001
  throughputGasPerSecond: 20000000

# -----------------------------------------------------------------------------
# Stablecoin contracts on Arc Testnet
# Source: https://docs.arc.io/arc/references/contract-addresses
# -----------------------------------------------------------------------------
contracts:
  usdc:
    address: "0x3600000000000000000000000000000000000000"
    nativeDecimals: 18                   # gas / msg.value
    erc20Decimals: 6                     # application transfers — USE THIS
    interfaceNote: |
      Native (18 dec) and ERC-20 (6 dec) share the same balance. Protocol
      contracts MUST use the ERC-20 interface exclusively. See pitfall #1.

  eurc:
    address: "0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a"
    decimals: 6

  usyc:
    # Yield-bearing tokenized money-market fund (permissioned).
    # https://developers.circle.com/tokenized/usyc/overview
    token: "0xe9185F0c5F296Ed1797AaE4238D26CCaBEadb86C"
    entitlements: "0xcc205224862c7641930c87679e98999d23c26113"
    teller: "0x9fdF14c5B14173D74C08Af27AebFf39240dC105A"
    decimals: 6
    permissioned: true
    allowlist:
      # Updated after Circle Support approves the allowlist ticket.
      # Open a ticket at https://support.circle.com with the deployer / treasury
      # addresses and the Arc Testnet wallet you wish to allowlist.
      deployer: TBD                      # e.g. 0xAbC...
      treasury: TBD
      portalUrl: https://usyc.dev.hashnote.com/

