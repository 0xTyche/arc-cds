name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FOUNDRY_PROFILE: ci

jobs:
  lint-fmt:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: forge fmt check
        run: forge fmt --check

  build:
    name: Build & Size Check
    runs-on: ubuntu-latest
    needs: lint-fmt
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: forge build
        run: forge build --sizes

      - name: Cache forge artifacts
        uses: actions/cache@v4
        with:
          path: |
            out/
            cache/
          key: forge-${{ runner.os }}-${{ hashFiles('foundry.toml', 'remappings.txt', 'contracts/**/*.sol') }}

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Restore forge cache
        uses: actions/cache@v4
        with:
          path: |
            out/
            cache/
          key: forge-${{ runner.os }}-${{ hashFiles('foundry.toml', 'remappings.txt', 'contracts/**/*.sol') }}

      - name: forge test (CI profile — 5k fuzz runs)
        run: forge test -j 4

  snapshot:
    name: Gas Snapshot
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: forge snapshot (no regression check on first run)
        run: forge snapshot

      - name: Upload gas snapshot
        uses: actions/upload-artifact@v4
        with:
          name: gas-snapshot
          path: .gas-snapshot

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: forge coverage
        run: forge coverage --report lcov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: lcov-report
          path: lcov.info

  # ── Static analysis (non-blocking until contracts exist) ───────────────────
  slither:
    name: Slither
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true    # flip to false once core contracts are implemented
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - uses: crytic/setup-action@v2

      - name: slither analysis
        uses: crytic/slither-action@v0.4.1
        with:
          target: contracts/
          slither-args: --exclude-dependencies
          fail-on: high
